# Clustead 리버스 프록시 — HTTPS (인증서 발급 후 사용)
# 사용법: 인증서 발급(certbot) 후 docker-compose 의 nginx default.conf 마운트를
#   ./deploy/nginx/clustead.conf → ./deploy/nginx/clustead-ssl.conf 로 바꾸고 nginx 재기동.
upstream clustead_app {
    server app:8000;
}

# HTTP: ACME 갱신 챌린지만 받고 나머지는 HTTPS로 영구 리다이렉트.
server {
    listen 80;
    server_name clustead.com www.clustead.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name clustead.com www.clustead.com;

    ssl_certificate     /etc/letsencrypt/live/clustead.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/clustead.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # HTTPS 정상 동작 확인 후 유지 권장(브라우저가 HTTPS를 기억).
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 2m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://clustead_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
