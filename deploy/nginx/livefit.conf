# LiveFit 리버스 프록시 — 소규모 외부 공개(A안) / OCI 단일 VPS
upstream livefit_app {
    server app:8000;
}

server {
    listen 80;
    server_name _;            # 도메인 확정 시 교체 (예: livefit.example.com)

    client_max_body_size 2m;  # GET 위주 서비스라 작게.

    # result 페이지가 크다(~0.9MB) → gzip 으로 전송량 대폭 절감.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml image/svg+xml;

    # TLS 발급(certbot ACME challenge) — HTTPS 적용 시 사용.
    # location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / {
        proxy_pass http://livefit_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /result 의 Kakao 동기 호출 대비 — gunicorn timeout(60s)과 맞춤.
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}

