# Clustead 리버스 프록시 — HTTP 부트스트랩 (인증서 발급 전 / OCI 단일 VPS)
# 이 설정은 인증서를 참조하지 않으므로 첫 부팅에서 항상 뜬다. HTTP로 사이트가 살아있고
# ACME(Let's Encrypt) 챌린지도 받는다. 인증서 발급 후 clustead-ssl.conf 로 교체한다(DEPLOY.md).
upstream clustead_app {
    server app:8000;
}

server {
    listen 80;
    server_name clustead.com www.clustead.com;

    client_max_body_size 2m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript text/xml application/xml image/svg+xml;

    # Let's Encrypt webroot 챌린지(발급·갱신 공용).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://clustead_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
    }
}
