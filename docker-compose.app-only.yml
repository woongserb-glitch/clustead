# Clustead 경량 운영 구성 — NCP 1GB VPS.
# app(gunicorn) 컨테이너는 로컬(127.0.0.1:8000)에만 노출하고,
# host nginx 가 80/443(HTTPS, Let's Encrypt)을 받아 프록시한다.
# (container nginx/certbot 3종 세트는 1GB에 무거워 host nginx 1개로 대체)
services:
  app:
    build: .
    image: clustead-app
    restart: unless-stopped
    env_file: .env
    environment:
      - WEB_CONCURRENCY=1          # 1GB RAM → 워커 1개(요청 직렬화)
      - CLUSTEAD_TRUST_PROXY=1     # host nginx 뒤 → ProxyFix on(실제 IP/HTTPS 인식)
    volumes:
      - ./data:/app/data           # 1.4GB 데이터 + Kakao 캐시 write(rw)
    ports:
      - "127.0.0.1:8000:8000"      # 로컬에만 노출; 외부는 host nginx(80/443)가 프록시
    # 메모리 상한: 폭주 시 host 가 hang 되는 대신 컨테이너만 OOM-kill 되게 한다(1GB 안전장치).
    # 현재 정상 사용량 ~500MB 기준 768m 상한 + swap 768m 허용.
    mem_limit: 768m
    memswap_limit: 1536m
