<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // 모바일(≤760px)에서는 d3 네트워크 그래프 대신 Explore로 진입.
        // <head>에서 즉시 실행해 무거운 그래프 스크립트 로드 전에 전환한다.
        // ?home=graph 로 강제 우회(태블릿/디버그용).
        (function () {
            try {
                if (location.search.indexOf('home=graph') !== -1) return;
                if (window.matchMedia('(max-width: 760px)').matches) {
                    location.replace('/explore');
                }
            } catch (e) { /* matchMedia 미지원 시 홈 유지 */ }
        })();
    </script>
    <title>Clustead — 내 삶에 맞는 서울 아파트</title>
    <meta name="description" content="집값·브랜드가 아니라 실제 누리는 생활 인프라(교통·의료·교육·편의·안전)를 서울시 상대평가로 점수화. Cluster + Stead, Clustead.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Clustead">
    <meta property="og:title" content="Clustead — 내 삶에 맞는 서울 아파트">
    <meta property="og:description" content="집값이 아니라 생활 인프라로 보는 서울 아파트. 교통·의료·교육·편의·안전을 서울시 상대평가로 점수화.">
    <meta property="og:url" content="https://clustead.com/">
    <meta property="og:image" content="https://clustead.com/static/brand/og-clustead.svg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='vendor/jost/jost.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='home.css') }}?v=35">
</head>

<body class="hg-body">
    <div class="hg-loading is-hidden" id="homeLoadingOverlay" aria-live="polite">
        <div class="hg-loading-card">
            <span class="hg-aperture-spin" aria-hidden="true">
                <svg viewBox="0 0 100 100" fill="currentColor">
                    <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(0 50 50)"/>
                    <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(60 50 50)" opacity="0.4"/>
                    <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(120 50 50)"/>
                    <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(180 50 50)"/>
                    <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(240 50 50)"/>
                    <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(300 50 50)"/>
                </svg>
            </span>
            <strong>조건에 맞는 단지를 찾는 중</strong>
            <p>선택한 생활 조건을 기준으로 서울시 아파트를 탐색하고 있습니다.</p>
        </div>
    </div>

    <div class="hg-shell">
        <!-- 상단 바 -->
        <header class="hg-topbar">
            <a class="hg-brand" href="/">
                <span class="hg-brand-mark" aria-hidden="true">
                    <svg viewBox="0 0 100 100" fill="#FFFFFF">
                        <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(0 50 50)"/>
                        <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(60 50 50)" opacity="0.4"/>
                        <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(120 50 50)"/>
                        <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(180 50 50)"/>
                        <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(240 50 50)"/>
                        <polygon points="50,9 85.5,29.5 65,49.5 57,36.8" transform="rotate(300 50 50)"/>
                    </svg>
                </span>
                <span class="hg-brand-text">CLUSTEAD</span>
            </a>
            <div class="hg-topbar-center">
                <p class="hg-tagline">원하는 조건을 순서대로 선택하세요. <b>아파트</b>가 보입니다.</p>
            </div>
            <div class="hg-topbar-actions">
                <form action="/result" method="get" class="hg-name-search" data-name-search>
                    <input type="text" name="apartment" placeholder="아파트명 직접 검색"
                        autocomplete="off" data-name-input aria-label="아파트명 검색">
                    <input type="hidden" name="src" value="home">
                    <button type="submit" aria-label="검색">⌕</button>
                    <div class="hg-name-menu" data-name-menu hidden></div>
                </form>
                <a class="hg-compare-btn" href="/compare">⚖ 단지 비교</a>
            </div>
        </header>

        <!-- 프리셋 바 (선제 셋팅: 지역/면적/가격) -->
        <div class="hg-presetbar" data-presetbar>
            <button class="hg-preset" type="button" data-preset="gu">
                <span class="hg-preset-icon">📍</span>
                <span class="hg-preset-label" data-preset-label="gu">지역</span>
                <span class="hg-preset-caret">▾</span>
            </button>
            <button class="hg-preset" type="button" data-preset="area">
                <span class="hg-preset-icon">📐</span>
                <span class="hg-preset-label" data-preset-label="area">전용면적</span>
                <span class="hg-preset-caret">▾</span>
            </button>
            <button class="hg-preset" type="button" data-preset="household">
                <span class="hg-preset-icon">🏢</span>
                <span class="hg-preset-label" data-preset-label="household">세대수</span>
                <span class="hg-preset-caret">▾</span>
            </button>
            <button class="hg-preset" type="button" data-preset="price">
                <span class="hg-preset-icon">💰</span>
                <span class="hg-preset-label" data-preset-label="price">실거래가</span>
                <span class="hg-preset-caret">▾</span>
            </button>
        </div>

        <!-- 네트워크 그래프 캔버스 -->
        <main class="hg-stage" data-stage>
            <svg class="hg-svg" data-svg aria-label="Clustead 생활 인프라 마인드맵"></svg>

            <!-- 브랜드 호버 툴팁 -->
            <div class="hg-tooltip" data-tooltip hidden></div>

            <!-- 노드 클릭형 검색 패널 스택 (여러 개 동시·좌측 고정) -->
            <div class="hg-search-stack" data-search-stack></div>

            <div class="hg-stage-hint" data-stage-hint>
                <kbd>드래그</kbd> 이동 · <kbd>휠</kbd> 확대/축소 · 노드를 눌러 가지를 펼치세요
            </div>
        </main>

        <!-- 선택 트레이 + 탐색 버튼 -->
        <aside class="hg-tray" data-tray hidden>
            <div class="hg-tray-head">
                <strong>선택한 조건</strong>
                <span class="hg-tray-count" data-tray-count>0</span>
            </div>
            <p class="hg-tray-note">위에서부터 <b>생활 인프라 우선순위</b> 순서입니다.</p>
            <ul class="hg-tray-list" data-tray-list></ul>
            <div class="hg-tray-actions">
                <button type="button" class="hg-tray-reset" data-tray-reset>전체 해제</button>
                <button type="button" class="hg-share-btn" data-share-url>공유하기</button>
                <button type="button" class="hg-explore-btn" data-explore-btn>
                    탐색하기 <span class="hg-explore-arrow">→</span>
                </button>
            </div>
        </aside>

        <button type="button" class="hg-tray-fab" data-tray-fab hidden>
            <span data-fab-count>0</span>개 조건 · 탐색하기
        </button>
        <button type="button" class="hg-share-fab" data-share-url data-share-fab hidden>공유</button>
    </div>

    <script id="home-config" type="application/json">{{ home_config | tojson | safe }}</script>
    <script src="{{ url_for('static', filename='share.js') }}?v=1"></script>
    <script src="{{ url_for('static', filename='vendor/d3.min.js') }}"></script>
    <script src="{{ url_for('static', filename='home.js') }}?v=29"></script>
</body>

</html>
